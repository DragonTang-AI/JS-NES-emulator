<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a2e">
  <title>NES 模拟器</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="../css/common.css?v=5">
  <link rel="stylesheet" href="../css/h5.css?v=5">
</head>
<body>
  <div id="loading-overlay" class="hidden">
    <div class="loading-logo">
      <span>N</span><span>E</span><span>S</span>
    </div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
    <div class="loading-text" id="loading-text">Loading...</div>
  </div>

  <button id="menu-toggle" class="menu-toggle">☰</button>
  <button id="quick-settings-btn" class="quick-settings-toggle" aria-label="打开设置">⚙</button>

  <div id="nes-container"></div>

  <div id="virtual-gamepad" hidden>
    <div id="joystick-zone" class="joystick-zone"></div>
    <div id="joystick-base" class="joystick-base"></div>
    <div id="joystick-knob" class="joystick-knob"></div>
    <div id="joystick-hint" class="joystick-hint">左侧任意滑动控制方向</div>
    <div id="gamepad-gradient" class="gamepad-gradient"></div>

    <div class="action-buttons">
      <div class="action-btn btn-b" id="btn-b">B</div>
      <div class="action-btn btn-a" id="btn-a">A</div>
    </div>

    <div class="meta-buttons">
      <div class="meta-btn sv-btn" id="btn-save">存</div>
      <div class="meta-btn" id="btn-select">SELECT</div>
      <div class="meta-btn" id="btn-start">START</div>
      <div class="meta-btn ld-btn" id="btn-load">读</div>
    </div>
  </div>

  <div id="cheat-indicator" hidden></div>
  <div id="orientation-toast" class="orientation-toast" hidden>
    <span>💡 建议横屏游玩体验更佳</span>
    <button id="orientation-toast-close">✕</button>
  </div>
  <button id="fullscreen-btn" class="fullscreen-btn" aria-label="全屏">⛶</button>
  <button id="screenshot-btn" class="screenshot-btn" aria-label="截图分享">📷</button>

  <div id="slide-menu" hidden>
    <div class="slide-menu-backdrop" id="slide-menu-backdrop"></div>
    <div class="slide-menu-panel">
      <div class="slide-menu-header">
        <span class="slide-menu-header-title">菜单</span>
        <button id="slide-menu-close">✕</button>
      </div>
      <div class="slide-menu-body">
        <div class="menu-item menu-item-full" id="menu-account">
          <span class="menu-item-icon">👤</span>
          <span class="menu-item-label" id="menu-account-label">未登录</span>
          <span class="menu-item-arrow-simple">›</span>
        </div>
        <div class="menu-subpage" id="menu-account-subpage" hidden>
          <div class="menu-auth-form" id="menu-auth-form">
            <input id="auth-username" type="text" maxlength="24" placeholder="账号（3-24位）" autocomplete="username">
            <input id="auth-password" type="password" maxlength="64" placeholder="密码（至少6位）" autocomplete="current-password">
            <div class="menu-auth-actions">
              <button id="auth-login-btn" type="button">登录</button>
              <button id="auth-register-btn" type="button">注册</button>
            </div>
          </div>
          <div class="menu-auth-info" id="menu-auth-info" hidden>
            <div class="menu-auth-user" id="menu-auth-user"></div>
            <div class="menu-auth-actions">
              <button id="auth-logout-btn" type="button">退出</button>
              <button id="auth-sync-btn" type="button">↻ 同步</button>
            </div>
          </div>
        </div>
        <div class="menu-item menu-item-full" id="menu-upload">
          <span class="menu-item-icon">📁</span>
          <span class="menu-item-label">上传 ROM</span>
          <span class="menu-item-arrow-simple">›</span>
        </div>
        <div class="menu-grid">
          <div class="menu-item" id="menu-library">
            <span class="menu-item-icon">📚</span>
            <span class="menu-item-label">游戏库</span>
          </div>
          <div class="menu-item" id="menu-favorites">
            <span class="menu-item-icon">⭐</span>
            <span class="menu-item-label">收藏</span>
          </div>
          <div class="menu-item" id="menu-cheats">
            <span class="menu-item-icon">⚡</span>
            <span class="menu-item-label">外挂</span>
            <span class="menu-item-badge" id="menu-cheats-badge" hidden></span>
          </div>
        </div>

      </div>
      <div class="slide-menu-status" id="slide-menu-status"></div>
    </div>
  </div>

  <input type="file" id="rom-upload" accept=".nes" hidden>

  <div id="settings-modal" class="settings-modal" hidden>
    <div class="settings-card">
      <div class="settings-header">
        <span>设置</span>
        <button id="settings-close" class="settings-close">✕</button>
      </div>

      <div class="settings-row">
        <label for="setting-music">音乐开关</label>
        <label class="switch-toggle">
          <input id="setting-music" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <label for="setting-volume">音量</label>
        <input id="setting-volume" type="range" min="0" max="100" step="1">
        <span class="settings-volume-value" id="setting-volume-value">80%</span>
      </div>

      <div class="settings-row">
        <label for="setting-joystick-mode">摇杆模式</label>
        <select id="setting-joystick-mode">
          <option value="floating">浮动</option>
          <option value="fixed">固定</option>
        </select>
      </div>

      <div class="settings-row">
        <label for="setting-vibration">按键震动</label>
        <label class="switch-toggle">
          <input id="setting-vibration" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <label for="setting-show-hint">摇杆提示</label>
        <label class="switch-toggle">
          <input id="setting-show-hint" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row">
        <label for="setting-mmc3-fix">MMC3 修复(临时)</label>
        <label class="switch-toggle">
          <input id="setting-mmc3-fix" type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="settings-row settings-row-debug">
        <label>Mapper 状态</label>
        <span id="mapper-debug-info" class="settings-debug-info">-</span>
      </div>
    </div>
  </div>

  <div id="auth-prompt-modal" class="auth-prompt-modal" hidden>
    <div class="auth-prompt-card">
      <button id="auth-prompt-close" class="auth-prompt-close">×</button>
      <div class="auth-prompt-title">登录后可永久云存档</div>
      <div class="auth-prompt-desc">游客模式可直接游玩，但清缓存/换设备后存档会丢失。</div>
      <div class="auth-prompt-actions">
        <button id="auth-prompt-login" type="button">去登录</button>
        <button id="auth-prompt-guest" type="button">游客模式继续</button>
      </div>
    </div>
  </div>

  <div id="library-modal" class="pixel-modal" hidden>
    <div class="pixel-modal-card">
      <div class="pixel-modal-header">
        <span class="pixel-modal-title" id="library-modal-title">游戏库</span>
        <button id="library-modal-close" class="pixel-modal-close">✕</button>
      </div>
      <div class="pixel-modal-tabs">
        <button class="pixel-tab active" data-filter="all">游戏库</button>
        <button class="pixel-tab" data-filter="favorites">收藏</button>
      </div>
      <div class="pixel-modal-body" id="library-modal-body"></div>
    </div>
  </div>

  <div id="cheat-modal" class="pixel-modal" hidden>
    <div class="pixel-modal-card">
      <div class="pixel-modal-header">
        <span class="pixel-modal-title" id="cheat-modal-title">外挂</span>
        <button id="cheat-modal-close" class="pixel-modal-close">×</button>
      </div>
      <div class="pixel-modal-body" id="cheat-modal-body"></div>
    </div>
  </div>

  <script src="https://unpkg.com/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="../js/core/emulator.js?v=5"></script>
  <script src="../js/core/rom-manager.js?v=5"></script>
  <script src="../js/core/save-manager.js?v=5"></script>
  <script src="../js/h5/virtual-gamepad.js?v=5"></script>
  <script src="../js/h5/cheat-library.js?v=5"></script>
  <script src="../js/h5/auth-ui.js?v=5"></script>
  <script src="../js/h5/cheat-ui.js?v=5"></script>
  <script src="../js/h5/settings-ui.js?v=5"></script>
  <script src="../js/h5/h5-app.js?v=5"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(function(e) {
    console.warn('SW registration failed:', e);
  });
}
</script>
</body>
</html>
